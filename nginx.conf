server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy to Jenkins — avoids CORS, injects auth
    location /api/trigger {
        proxy_pass https://jenkins.clearing.dev.gcp.dbgcloud.io/job/SCS/job/test/job/delete/buildWithParameters;

        # Protocol
        proxy_http_version 1.1;
        proxy_set_header Host jenkins.clearing.dev.gcp.dbgcloud.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_set_header Content-Length "";

        # Jenkins Basic Auth (zn685 + API token)
        proxy_set_header Authorization "Basic em42ODU6MTExNDUyMTlmOGU3ZjNkZTJmNTkxOThhZmI0OTE0NDgxYg==";

        # SSL upstream
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # Timeouts
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location ~* \.(html|css|js|ico)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
