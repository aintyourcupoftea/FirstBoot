server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy to Jenkins — avoids CORS
    location /api/trigger {
        # Rewrite to Jenkins build URL
        proxy_pass https://jenkins.clearing.dev.gcp.dbgcloud.io/job/SCS/job/test/job/delete/buildWithParameters;

        # Pass query params through (token, USERNAME, NAME)
        proxy_method POST;
        proxy_set_header Host jenkins.clearing.dev.gcp.dbgcloud.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Length "";

        # Internal cert — skip verification
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        # Timeout settings
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location ~* \.(html|css|js|ico)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
